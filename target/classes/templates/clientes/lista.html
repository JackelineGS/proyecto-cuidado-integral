<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'clientes', 'Clientes')}">
<head>
    <title>Clientes - Argos</title>
</head>
<body>

<main class="space-y-6">

    <div class="flex justify-end">
        <a th:href="@{/clientes(action='nuevo')}"
           class="flex items-center gap-2 bg-[#1d9e75] text-white font-['DM_Sans'] font-semibold text-[14px] px-6 py-2 rounded-[40px] hover:bg-[#158963] transition-colors whitespace-nowrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            Agregar Cliente
        </a>
    </div>

    <div th:if="${showForm}" class="bg-white rounded-[20px] p-6 border border-[#e8e4de] shadow-sm animate-fade-in">
        <h3 class="font-['Playfair_Display'] font-bold text-[20px] text-[#085041] mb-4"
            th:text="${cliente.id != null} ? 'Editar Cliente' : 'Nuevo Cliente'">
            Nuevo Cliente
        </h3>

        <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post" class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <input type="hidden" th:field="*{id}" />

            <div>
                <label class="block font-['DM_Sans'] text-[14px] text-[#5f5e5a] mb-2">Nombre</label>
                <input type="text" th:field="*{name}" class="w-full px-4 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75]" required />
            </div>

            <div>
                <label class="block font-['DM_Sans'] text-[14px] text-[#5f5e5a] mb-2">DNI</label>
                <input type="text" th:field="*{dni}" maxlength="8" placeholder="12345678" class="w-full px-4 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75]" required />
            </div>

            <div>
                <label class="block font-['DM_Sans'] text-[14px] text-[#5f5e5a] mb-2">Correo</label>
                <input type="email" th:field="*{email}" class="w-full px-4 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75]" required />
            </div>

            <div>
                <label class="block font-['DM_Sans'] text-[14px] text-[#5f5e5a] mb-2">Celular</label>
                <input type="tel" th:field="*{phone}" class="w-full px-4 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75]" required />
            </div>

            <div>
                <label class="block font-['DM_Sans'] text-[14px] text-[#5f5e5a] mb-2">Fecha de creación</label>
                <input type="date" th:field="*{createdAt}" class="w-full px-4 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75]" required />
            </div>

            <div class="col-span-1 md:col-span-2 flex gap-4 justify-end mt-2">
                <a th:href="@{/clientes}"
                   class="px-6 py-2 border border-[#e8e4de] rounded-[40px] font-['DM_Sans'] text-[14px] text-[#5f5e5a] hover:bg-[#f7f3ee] transition-colors text-center">
                    Cancelar
                </a>
                <button type="submit"
                        class="px-6 py-2 bg-[#1d9e75] text-white rounded-[40px] font-['DM_Sans'] font-semibold text-[14px] hover:bg-[#158963] transition-colors">
                    Guardar
                </button>
            </div>
        </form>
    </div>

    <div class="bg-white rounded-[20px] overflow-hidden border border-[#e8e4de] shadow-sm">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-[#f7f3ee]">
                <tr>
                    <th class="px-6 py-4 text-left font-['DM_Sans'] font-semibold text-[14px] text-[#085041]">Nombre</th>
                    <th class="px-6 py-4 text-left font-['DM_Sans'] font-semibold text-[14px] text-[#085041]">DNI</th>
                    <th class="px-6 py-4 text-left font-['DM_Sans'] font-semibold text-[14px] text-[#085041]">Correo</th>
                    <th class="px-6 py-4 text-left font-['DM_Sans'] font-semibold text-[14px] text-[#085041]">Celular</th>
                    <th class="px-6 py-4 text-left font-['DM_Sans'] font-semibold text-[14px] text-[#085041]">Fecha de creación</th>
                    <th class="px-6 py-4 text-left font-['DM_Sans'] font-semibold text-[14px] text-[#085041]">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(clients)}">
                    <td colspan="6" class="px-6 py-10 text-center font-['DM_Sans'] text-[14px] text-[#5f5e5a]">
                        No hay clientes registrados aún.
                    </td>
                </tr>

                <tr th:unless="${#lists.isEmpty(clients)}"
                    th:each="client, iter : ${clients}"
                    th:classappend="${iter.index % 2 == 0} ? 'bg-white' : 'bg-[#fafafa]'"
                    class="border-t border-[#e8e4de] transition-colors">

                    <td class="px-6 py-4 font-['DM_Sans'] font-medium text-[14px] text-[#2c2c2a]" th:text="${client.name}">Juan Pérez</td>
                    <td class="px-6 py-4 font-['DM_Sans'] text-[14px] text-[#5f5e5a]" th:text="${client.dni != null && !client.dni.isEmpty()} ? ${client.dni} : '—'">12345678</td>
                    <td class="px-6 py-4 font-['DM_Sans'] text-[14px] text-[#5f5e5a]" th:text="${client.email}">juan@correo.com</td>
                    <td class="px-6 py-4 font-['DM_Sans'] text-[14px] text-[#5f5e5a]" th:text="${client.phone}">987654321</td>
                    <td class="px-6 py-4 font-['DM_Sans'] text-[14px] text-[#5f5e5a]"
                        th:text="${client.createdAt != null} ? ${#temporals.format(client.createdAt, 'dd/MM/yyyy', 'es-PE')} : '—'">
                        11/06/2026
                    </td>
                    <td class="px-6 py-4">
                        <a th:href="@{/clientes(action='editar', id=${client.id})}"
                           class="text-[#1d9e75] hover:text-[#158963] inline-block transition-colors p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

</body>
</html>
