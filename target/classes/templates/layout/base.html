<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, currentSection, pageTitle)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle + ' - Argos'}">Argos</title>
    <!-- Enlace a tus estilos globales de Tailwind -->
    <link th:href="@{/css/tailwind.css}" rel="stylesheet">
    <!-- Opcional: CDN de Tailwind v4 si aún no configuras tu compilador local -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="font-['DM_Sans'] antialiased">

<div class="flex h-screen bg-[#f7f3ee]">

    <!-- ================= SIDEBAR LATERAL ================= -->
    <aside class="w-64 bg-[#085041] text-white flex flex-col shrink-0">
        <!-- Logo y Cabecera del Sidebar -->
        <div class="p-6">
            <h1 class="font-['Playfair_Display'] font-bold text-[28px]">ARGOS</h1>
            <p class="font-['DM_Sans'] text-[12px] text-[rgba(255,255,255,0.7)] mt-1">Panel Veterinario</p>
        </div>

        <!-- Navegación del Menú (Simulación dinámica de isActive de React) -->
        <nav class="flex-1 px-4 space-y-1">

            <!-- Enlace: Dashboard -->
            <a th:href="@{/dashboard}"
               class="flex items-center gap-3 px-4 py-3 rounded-lg font-['DM_Sans'] text-[14px] transition-colors"
               th:classappend="${currentSection == 'dashboard'} ? 'bg-[#1d9e75] text-white' : 'text-[rgba(255,255,255,0.7)] hover:bg-[rgba(255,255,255,0.1)]'">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Dashboard
            </a>

            <!-- Enlace: Pacientes -->
            <a th:href="@{/pacientes}"
               class="flex items-center gap-3 px-4 py-3 rounded-lg font-['DM_Sans'] text-[14px] transition-colors"
               th:classappend="${currentSection == 'pacientes'} ? 'bg-[#1d9e75] text-white' : 'text-[rgba(255,255,255,0.7)] hover:bg-[rgba(255,255,255,0.1)]'">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/><path d="m8 14 4 4"/></svg>
                Pacientes
            </a>

            <!-- Enlace: Clientes -->
            <a th:href="@{/clientes}"
               class="flex items-center gap-3 px-4 py-3 rounded-lg font-['DM_Sans'] text-[14px] transition-colors"
               th:classappend="${currentSection == 'clientes'} ? 'bg-[#1d9e75] text-white' : 'text-[rgba(255,255,255,0.7)] hover:bg-[rgba(255,255,255,0.1)]'">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Clientes
            </a>

            <!-- Enlace: Citas -->
            <a th:href="@{/citas}"
               class="flex items-center gap-3 px-4 py-3 rounded-lg font-['DM_Sans'] text-[14px] transition-colors"
               th:classappend="${currentSection == 'citas'} ? 'bg-[#1d9e75] text-white' : 'text-[rgba(255,255,255,0.7)] hover:bg-[rgba(255,255,255,0.1)]'">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
                Citas
            </a>

            <!-- Enlace: Productos -->
            <a th:href="@{/productos}"
               class="flex items-center gap-3 px-4 py-3 rounded-lg font-['DM_Sans'] text-[14px] transition-colors"
               th:classappend="${currentSection == 'productos'} ? 'bg-[#1d9e75] text-white' : 'text-[rgba(255,255,255,0.7)] hover:bg-[rgba(255,255,255,0.1)]'">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                Productos
            </a>

            <!-- Enlace: Adopciones -->
            <a th:href="@{/adopciones}"
               class="flex items-center gap-3 px-4 py-3 rounded-lg font-['DM_Sans'] text-[14px] transition-colors"
               th:classappend="${currentSection == 'adopciones'} ? 'bg-[#1d9e75] text-white' : 'text-[rgba(255,255,255,0.7)] hover:bg-[rgba(255,255,255,0.1)]'">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                Adopciones
            </a>
        </nav>

        <!-- Botón de Cerrar Sesión -->
        <div class="p-4 border-t border-[rgba(255,255,255,0.1)]">
            <a th:href="@{/logout}"
               class="flex items-center gap-3 px-4 py-3 rounded-lg w-full font-['DM_Sans'] text-[14px] text-[rgba(255,255,255,0.7)] hover:bg-[rgba(255,255,255,0.1)] transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Cerrar Sesión
            </a>
        </div>
    </aside>

    <!-- ================= CONTENEDOR PRINCIPAL DERECHO ================= -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- HEADER BLANCO SUPERIOR -->
        <header class="bg-white border-b border-[#e8e4de] px-8 py-4 flex items-center justify-between shrink-0">
            <!-- Título Dinámico de la Página -->
            <h2 class="font-['Playfair_Display'] font-bold text-[24px] text-[#085041]" th:text="${pageTitle}">
                Dashboard
            </h2>

            <!-- Menú Desplegable "Nuevo" (Manejo con Vanilla JS) -->
            <div class="relative">
                <button id="btnNuevo" onclick="toggleMenu()"
                        class="flex items-center gap-2 bg-[#1d9e75] text-white font-['DM_Sans'] font-semibold text-[14px] px-6 py-2 rounded-[40px] hover:bg-[#158963] transition-colors focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                    Nuevo
                </button>

                <!-- Caja Oculta del Menú (Equivalente al state showNewMenu de React) -->
                <div id="dropdownNuevo" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-[#e8e4de] overflow-hidden z-50">
                    <a th:href="@{/clientes}" class="block w-full text-left px-4 py-2 font-['DM_Sans'] text-[14px] text-[#2c2c2a] hover:bg-[#f7f3ee] transition-colors">Cliente</a>
                    <a th:href="@{/pacientes}" class="block w-full text-left px-4 py-2 font-['DM_Sans'] text-[14px] text-[#2c2c2a] hover:bg-[#f7f3ee] transition-colors">Paciente</a>
                    <a th:href="@{/citas}" class="block w-full text-left px-4 py-2 font-['DM_Sans'] text-[14px] text-[#2c2c2a] hover:bg-[#f7f3ee] transition-colors">Cita</a>
                    <a th:href="@{/productos}" class="block w-full text-left px-4 py-2 font-['DM_Sans'] text-[14px] text-[#2c2c2a] hover:bg-[#f7f3ee] transition-colors">Producto</a>
                    <a th:href="@{/adopciones}" class="block w-full text-left px-4 py-2 font-['DM_Sans'] text-[14px] text-[#2c2c2a] hover:bg-[#f7f3ee] transition-colors">Perfil (Adopción)</a>
                </div>
            </div>
        </header>

        <!-- ÁREA DE CONTENIDO DINÁMICO (th:replace) -->
        <main class="flex-1 overflow-auto p-8">
            <div th:replace="${content}"></div>
        </main>
    </div>
</div>

<!-- Script minimalista para la apertura/cierre del dropdown -->
<script>
    function toggleMenu() {
        const menu = document.getElementById('dropdownNuevo');
        menu.classList.toggle('hidden');
    }

    // Cierra el menú automáticamente si haces clic fuera de él
    window.onclick = function(event) {
        if (!event.target.matches('#btnNuevo') && !event.target.closest('#btnNuevo')) {
            const dropdown = document.getElementById('dropdownNuevo');
            if (!dropdown.classList.contains('hidden')) {
                dropdown.classList.add('hidden');
            }
        }
    }
</script>
</body>
</html>
