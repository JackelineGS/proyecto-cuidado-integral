<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="public-header" class="bg-white border-b border-[#e8e4de] px-12 py-4 fixed top-0 left-0 right-0 z-50 h-[80px] flex items-center justify-between shadow-sm">
    <a th:href="@{/}" class="font-['Playfair_Display'] font-bold text-[28px] text-[#085041] tracking-wide">ARGOS</a>

    <nav class="hidden md:flex items-center gap-8 font-['DM_Sans'] text-[15px] font-medium text-[#5f5e5a]">
        <a href="#servicios" onclick="smoothScroll(event, 'servicios')" class="hover:text-[#085041] transition-colors">Servicios</a>
        <a href="#reservar" onclick="smoothScroll(event, 'reservar')" class="hover:text-[#085041] transition-colors">Equipo Médico</a>
        <a href="#adopciones" onclick="smoothScroll(event, 'adopciones')" class="hover:text-[#085041] transition-colors">Adopciones</a>
        <a href="#productos" onclick="smoothScroll(event, 'productos')" class="hover:text-[#085041] transition-colors">Pet Shop</a>
        <a href="#nosotros" onclick="smoothScroll(event, 'nosotros')" class="hover:text-[#085041] transition-colors">Nosotros</a>
    </nav>

    <div class="flex items-center gap-4">
        <a th:href="@{/dashboard}" class="font-['DM_Sans'] text-[14px] font-semibold text-[#085041] hover:underline">Panel Interno</a>
        <a th:href="@{/agendar}" class="bg-[#1d9e75] text-white font-['DM_Sans'] font-semibold text-[14px] px-6 py-2.5 rounded-[40px] hover:bg-[#158963] transition-colors">
            Agendar Cita
        </a>
    </div>

    <script>
        function smoothScroll(e, id) {
            const element = document.getElementById(id);
            if (element) {
                e.preventDefault();
                element.scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</header>
</body>
</html>
