<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'adopciones', 'Adopciones')}">
<head>
    <title>Adopciones - Argos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<main class="space-y-6">

    <!-- Tabs + botón -->
    <div class="flex items-center justify-between flex-wrap gap-4">
        <div class="flex gap-1 bg-[#f7f3ee] rounded-[12px] p-1 select-none">
            <button onclick="switchAdoptionTab('pets')" id="tab-pets"
                    class="tab-btn-ad px-5 py-2 rounded-[10px] font-['DM_Sans'] font-semibold text-[14px] transition-colors text-[#5f5e5a]">
                <i class="fa-solid fa-paw mr-1 text-[12px]"></i> Mascotas en adopción
            </button>
            <button onclick="switchAdoptionTab('requests')" id="tab-requests"
                    class="tab-btn-ad relative px-5 py-2 rounded-[10px] font-['DM_Sans'] font-semibold text-[14px] transition-colors text-[#5f5e5a]">
                <i class="fa-solid fa-bell mr-1 text-[12px]"></i> Solicitudes
                <span th:if="${unreadCount > 0}" th:text="${unreadCount}"
                      class="absolute -top-1 -right-1 w-5 h-5 bg-[#d85a30] text-white rounded-full text-[10px] font-bold flex items-center justify-center">
                </span>
            </button>
        </div>

        <button id="btn-agregar" onclick="abrirModalMascotaNuevo()"
                class="flex items-center gap-2 bg-[#1d9e75] text-white font-['DM_Sans'] font-semibold text-[14px] px-6 py-2 rounded-[40px] hover:bg-[#158963] transition-colors">
            <i class="fa-solid fa-plus"></i>
            <span id="btn-agregar-label">Agregar Perfil</span>
        </button>
    </div>


    <div id="panel-pets" class="tab-panel-ad space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

            <div th:if="${#lists.isEmpty(adoptionPets)}"
                 class="col-span-full bg-white rounded-[20px] p-10 border border-[#e8e4de] text-center">
                <i class="fa-solid fa-paw text-[#b4b2a9] text-[36px] mb-3 block"></i>
                <p class="font-['DM_Sans'] text-[14px] text-[#5f5e5a]">No hay mascotas registradas para adopción.</p>
            </div>

            <div th:unless="${#lists.isEmpty(adoptionPets)}"
                th:each="mascota : ${adoptionPets}"
                class="rounded-[20px] p-5 border border-[#e8e4de] flex flex-col gap-4 hover:border-[#c8c4be] transition-colors shadow-md" style="background-color: rgb(171, 236, 191)">
                <!-- Cabecera: icono + acciones -->
                <div class="flex justify-between items-start">
                    <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg"
                        th:classappend="${mascota.especie == 'Gato'} ? 'bg-[#fff4e5]' : 'bg-[#e1f5ee]'">
                        <i th:class="${mascota.especie == 'Perro'} ? 'fa-solid fa-dog text-[#085041]' : (${mascota.especie == 'Gato'} ? 'fa-solid fa-cat text-[#b9770e]' : 'fa-solid fa-paw text-[#085041]')"></i>
                    </div>
                    <div class="flex gap-2">
                        <button
                            th:data-id="${mascota.id}"
                            th:data-nombre="${mascota.nombre}"
                            th:data-especie="${mascota.especie}"
                            th:data-raza="${mascota.raza}"
                            th:data-sexo="${mascota.sexo}"
                            th:data-edad="${mascota.edad}"
                            th:data-estado="${mascota.estado}"
                            th:data-descripcion="${mascota.descripcion}"
                            th:data-fecha="${mascota.fechaIngreso}"
                            onclick="abrirModalMascotaEditar(this)"
                            class="w-8 h-8 rounded-[8px] bg-[#f7f3ee] text-[#5f5e5a] hover:bg-[#e8e4de] border border-[#e8e4de] cursor-pointer flex items-center justify-center transition-colors">
                            <i class="fa-solid fa-pen text-[12px]"></i>
                        </button>
                        <a th:href="@{/adopciones/eliminar/{id}(id=${mascota.id})}"
                        onclick="return confirm('¿Eliminar este perfil de adopción?')"
                        class="w-8 h-8 rounded-[8px] bg-[#faece7] text-[#d85a30] hover:bg-[#f5c4b3] border border-[#f5c4b3] flex items-center justify-center transition-colors">
                            <i class="fa-solid fa-trash text-[12px]"></i>
                        </a>
                    </div>
                </div>

                <!-- Nombre + especie tag + descripción -->
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <h3 class="font-['Playfair_Display'] font-bold text-[16px] text-[#085041]"
                            th:text="${mascota.nombre}">Nombre</h3>
                        <span class="text-[11px] font-['DM_Sans'] font-semibold px-2 py-0.5 rounded-full"
                            th:classappend="${mascota.especie == 'Gato'} ? 'bg-[#fff4e5] text-[#b9770e]' : 'bg-[#e1f5ee] text-[#085041]'"
                            th:text="${mascota.especie}">Especie</span>
                    </div>
                    <p th:if="${mascota.descripcion != null and !mascota.descripcion.isEmpty()}"
                    th:text="${mascota.descripcion}"
                    class="font-['DM_Sans'] text-[12px] text-[#888780] italic leading-snug"></p>
                </div>

                <!-- Divisor -->
                <hr class="border-t border-[#e8e4de] m-0">

                <!-- Atributos en grid 2 columnas -->
                <div class="grid grid-cols-2 gap-x-3 gap-y-1.5 font-['DM_Sans'] text-[12px] text-[#5f5e5a]">
                    <span class="flex items-center gap-1.5">
                        <i class="fa-solid fa-dna text-[#1d9e75] text-[11px]"></i>
                        <span th:text="${mascota.raza}">Raza</span>
                    </span>
                    <span class="flex items-center gap-1.5">
                        <i class="fa-solid fa-venus-mars text-[#1d9e75] text-[11px]"></i>
                        <span th:text="${mascota.sexo}">Sexo</span>
                    </span>
                    <span class="flex items-center gap-1.5">
                        <i class="fa-solid fa-cake-candles text-[#1d9e75] text-[11px]"></i>
                        <span th:text="${mascota.edad} + ' años'">Edad</span>
                    </span>
                    <span th:if="${mascota.fechaIngreso != null}" class="flex items-center gap-1.5">
                        <i class="fa-solid fa-calendar text-[#1d9e75] text-[11px]"></i>
                        <span th:text="${mascota.fechaIngreso}">Fecha</span>
                    </span>
                </div>

                <!-- Badge de estado -->
                <div>
                    <span th:if="${mascota.estado == 'disponible'}"
                        class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[12px] font-['DM_Sans'] font-semibold bg-[#e1f5ee] text-[#085041]">
                        <i class="fa-solid fa-circle-check text-[10px]"></i> Disponible
                    </span>
                    <span th:if="${mascota.estado == 'en_proceso'}"
                        class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[12px] font-['DM_Sans'] font-semibold bg-[#fff4e5] text-[#b9770e]">
                        <i class="fa-solid fa-clock text-[10px]"></i> En proceso
                    </span>
                    <span th:if="${mascota.estado == 'adoptado'}"
                        class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[12px] font-['DM_Sans'] font-semibold bg-[#f1efe8] text-[#5f5e5a]">
                        <i class="fa-solid fa-house-heart text-[10px]"></i> Adoptado
                    </span>
                </div>
            </div>
        </div>
    </div>


    <!-- ========== PANEL: SOLICITUDES ========== -->
    <div id="panel-requests" class="tab-panel-ad hidden space-y-4">

        <div th:if="${#lists.isEmpty(adoptionRequests)}"
             class="bg-white rounded-[20px] p-10 border border-[#e8e4de] text-center">
            <i class="fa-solid fa-bell text-[#b0aba3] text-[32px] mb-3 block"></i>
            <p class="font-['DM_Sans'] text-[14px] text-[#5f5e5a]">No hay solicitudes de adopción aún.</p>
        </div>

        <div th:unless="${#lists.isEmpty(adoptionRequests)}"
             th:each="req : ${adoptionRequests}"
             th:id="'req-card-' + ${req.id}"
             th:classappend="${req.read} ? 'border-[#e8e4de]' : 'border-[#f5c6a8] bg-[#fffaf8]'"
             th:onclick="'marcarLeidoAsync(' + ${req.id} + ', ' + ${req.read} + ')'"
             class="bg-white rounded-[20px] p-5 border transition-colors cursor-pointer">

            <div class="flex items-start justify-between gap-4 flex-wrap sm:flex-nowrap">
                <div class="flex gap-3 flex-1">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0"
                         th:classappend="${req.read} ? 'bg-[#f7f3ee] text-[#5f5e5a]' : 'bg-[#faece7] text-[#d85a30]'">
                        <i class="fa-solid fa-bell text-[15px]"></i>
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <p class="font-['DM_Sans'] font-semibold text-[15px] text-[#085041]" th:text="${req.applicantName}">Solicitante</p>
                            <span th:id="'badge-unread-' + ${req.id}" th:unless="${req.read}"
                                  class="w-2 h-2 rounded-full bg-[#d85a30] inline-block"></span>
                        </div>
                        <p class="font-['DM_Sans'] text-[13px] text-[#5f5e5a] mb-2">
                            Quiere adoptar a <span class="font-semibold text-[#2c2c2a]" th:text="${req.petName}">Mascota</span>
                        </p>
                        <div class="flex flex-wrap gap-x-5 gap-y-1 font-['DM_Sans'] text-[12px] text-[#5f5e5a]">
                            <span><i class="fa-solid fa-envelope text-[#1d9e75] mr-1"></i><span th:text="${req.email}">correo</span></span>
                            <span><i class="fa-solid fa-phone text-[#1d9e75] mr-1"></i><span th:text="${req.phone}">telefono</span></span>
                            <span><i class="fa-solid fa-location-dot text-[#1d9e75] mr-1"></i><span th:text="${req.district}">distrito</span></span>
                        </div>
                        <p class="font-['DM_Sans'] text-[11px] text-[#b0aba3] mt-2"
                           th:text="${#temporals.format(req.createdAt, 'dd/MM/yyyy, HH:mm:ss', 'es-PE')}">fecha</p>
                    </div>
                </div>

                <div class="flex flex-col items-end gap-2 flex-shrink-0" onclick="event.stopPropagation();">
                    <span th:id="'status-badge-' + ${req.id}"
                          th:text="${statusLabelsMap.get(req.requestStatus)}"
                          th:classappend="${statusStylesMap.get(req.requestStatus)}"
                          class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-[12px] font-semibold transition-all">
                    </span>
                    <select th:data-id="${req.id}"
                            onchange="cambiarEstadoAsync(this.getAttribute('data-id'), this.value)"
                            class="text-[12px] font-['DM_Sans'] px-3 py-1.5 border border-[#e8e4de] rounded-[10px] focus:outline-none focus:border-[#1d9e75] text-[#5f5e5a] bg-white cursor-pointer">
                        <option value="pendiente"     th:selected="${req.requestStatus == 'pendiente'}">Pendiente</option>
                        <option value="en_evaluacion" th:selected="${req.requestStatus == 'en_evaluacion'}">En evaluación</option>
                        <option value="confirmado"    th:selected="${req.requestStatus == 'confirmado'}">Confirmado</option>
                        <option value="rechazado"     th:selected="${req.requestStatus == 'rechazado'}">Rechazado</option>
                        <option value="finalizado"    th:selected="${req.requestStatus == 'finalizado'}">Finalizado</option>
                    </select>
                </div>
            </div>
        </div>
    </div>


    <!-- ========== MODAL: MASCOTA ========== -->
    <div id="modalMascota"
         class="hidden fixed inset-0 bg-[rgba(8,80,65,0.4)] flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[20px] w-full max-w-lg shadow-xl">
            <div class="flex items-center justify-between p-6 border-b border-[#e8e4de]">
                <h3 id="modalMascotaTitulo" class="font-['Playfair_Display'] font-bold text-[20px] text-[#085041]">
                    <i class="fa-solid fa-paw text-[#1d9e75] mr-2 text-[16px]"></i> Nuevo Perfil de Adopción
                </h3>
                <button onclick="cerrarModal('modalMascota')"
                        class="w-8 h-8 flex items-center justify-center rounded-[8px] bg-[#f7f3ee] text-[#5f5e5a] hover:bg-[#e8e4de] border-none cursor-pointer">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <form th:action="@{/adopciones/mascota/guardar}" th:object="${mascotaAdopcion}" method="post"
                  class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" th:field="*{id}" id="m-id" />

                <div>
                    <label class="flex items-center gap-2 font-['DM_Sans'] text-[13px] text-[#5f5e5a] mb-2">
                        <i class="fa-solid fa-tag text-[#1d9e75]"></i> Nombre
                    </label>
                    <div class="relative">
                        <i class="fa-solid fa-tag absolute left-3 top-1/2 -translate-y-1/2 text-[#b4b2a9] text-[12px]"></i>
                        <input type="text" th:field="*{nombre}" id="m-nombre"
                               class="w-full pl-8 pr-3 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75] bg-[#fafaf8]"
                               placeholder="Ej. Max" required />
                    </div>
                </div>

                <div>
                    <label class="flex items-center gap-2 font-['DM_Sans'] text-[13px] text-[#5f5e5a] mb-2">
                        <i class="fa-solid fa-paw text-[#1d9e75]"></i> Especie
                    </label>
                    <div class="relative">
                        <i class="fa-solid fa-paw absolute left-3 top-1/2 -translate-y-1/2 text-[#b4b2a9] text-[12px]"></i>
                        <select th:field="*{especie}" id="m-especie"
                                class="w-full pl-8 pr-3 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75] bg-[#fafaf8] appearance-none">
                            <option value="Perro">Perro</option>
                            <option value="Gato">Gato</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="flex items-center gap-2 font-['DM_Sans'] text-[13px] text-[#5f5e5a] mb-2">
                        <i class="fa-solid fa-dna text-[#1d9e75]"></i> Raza
                    </label>
                    <div class="relative">
                        <i class="fa-solid fa-dna absolute left-3 top-1/2 -translate-y-1/2 text-[#b4b2a9] text-[12px]"></i>
                        <input type="text" th:field="*{raza}" id="m-raza"
                               class="w-full pl-8 pr-3 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75] bg-[#fafaf8]"
                               placeholder="Ej. Labrador" required />
                    </div>
                </div>

                <div>
                    <label class="flex items-center gap-2 font-['DM_Sans'] text-[13px] text-[#5f5e5a] mb-2">
                        <i class="fa-solid fa-venus-mars text-[#1d9e75]"></i> Sexo
                    </label>
                    <div class="relative">
                        <i class="fa-solid fa-venus-mars absolute left-3 top-1/2 -translate-y-1/2 text-[#b4b2a9] text-[12px]"></i>
                        <select th:field="*{sexo}" id="m-sexo"
                                class="w-full pl-8 pr-3 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75] bg-[#fafaf8] appearance-none">
                            <option value="Macho">Macho</option>
                            <option value="Hembra">Hembra</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="flex items-center gap-2 font-['DM_Sans'] text-[13px] text-[#5f5e5a] mb-2">
                        <i class="fa-solid fa-cake-candles text-[#1d9e75]"></i> Edad (años)
                    </label>
                    <div class="relative">
                        <i class="fa-solid fa-cake-candles absolute left-3 top-1/2 -translate-y-1/2 text-[#b4b2a9] text-[12px]"></i>
                        <input type="number" min="0" th:field="*{edad}" id="m-edad"
                               class="w-full pl-8 pr-3 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75] bg-[#fafaf8]"
                               placeholder="0" required />
                    </div>
                </div>

                <div>
                    <label class="flex items-center gap-2 font-['DM_Sans'] text-[13px] text-[#5f5e5a] mb-2">
                        <i class="fa-solid fa-circle-dot text-[#1d9e75]"></i> Estado
                    </label>
                    <div class="relative">
                        <i class="fa-solid fa-circle-dot absolute left-3 top-1/2 -translate-y-1/2 text-[#b4b2a9] text-[12px]"></i>
                        <select th:field="*{estado}" id="m-estado"
                                class="w-full pl-8 pr-3 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75] bg-[#fafaf8] appearance-none">
                            <option value="disponible">Disponible</option>
                            <option value="en_proceso">En proceso</option>
                            <option value="adoptado">Adoptado</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="flex items-center gap-2 font-['DM_Sans'] text-[13px] text-[#5f5e5a] mb-2">
                        <i class="fa-solid fa-calendar text-[#1d9e75]"></i> Fecha de ingreso
                    </label>
                    <div class="relative">
                        <i class="fa-solid fa-calendar absolute left-3 top-1/2 -translate-y-1/2 text-[#b4b2a9] text-[12px]"></i>
                        <input type="date" th:field="*{fechaIngreso}" id="m-fecha"
                               class="w-full pl-8 pr-3 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75] bg-[#fafaf8]" />
                    </div>
                </div>

                <div class="col-span-1 md:col-span-2">
                    <label class="flex items-center gap-2 font-['DM_Sans'] text-[13px] text-[#5f5e5a] mb-2">
                        <i class="fa-solid fa-align-left text-[#1d9e75]"></i> Descripción
                    </label>
                    <div class="relative">
                        <i class="fa-solid fa-align-left absolute left-3 top-3 text-[#b4b2a9] text-[12px]"></i>
                        <textarea th:field="*{descripcion}" id="m-descripcion" rows="2"
                                  class="w-full pl-8 pr-3 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75] bg-[#fafaf8]"
                                  placeholder="Descripción opcional..."></textarea>
                    </div>
                </div>

                <div class="col-span-1 md:col-span-2 flex gap-3 justify-end pt-2">
                    <button type="button" onclick="cerrarModal('modalMascota')"
                            class="px-6 py-2 border border-[#e8e4de] rounded-[40px] font-['DM_Sans'] text-[14px] text-[#5f5e5a] hover:bg-[#f7f3ee] bg-white border-none cursor-pointer transition-colors">
                        Cancelar
                    </button>
                    <button type="submit"
                            class="flex items-center gap-2 px-6 py-2 bg-[#1d9e75] text-white rounded-[40px] font-['DM_Sans'] font-semibold text-[14px] hover:bg-[#158963] border-none cursor-pointer transition-colors">
                        <i class="fa-solid fa-floppy-disk"></i> Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>


    <!-- ========== MODAL: SOLICITUD ========== -->
    <div id="modalSolicitud"
         class="hidden fixed inset-0 bg-[rgba(8,80,65,0.4)] flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[20px] w-full max-w-lg shadow-xl">
            <div class="flex items-center justify-between p-6 border-b border-[#e8e4de]">
                <h3 class="font-['Playfair_Display'] font-bold text-[20px] text-[#085041]">
                    <i class="fa-solid fa-file-pen text-[#1d9e75] mr-2 text-[16px]"></i> Nueva Solicitud de Adopción
                </h3>
                <button onclick="cerrarModal('modalSolicitud')"
                        class="w-8 h-8 flex items-center justify-center rounded-[8px] bg-[#f7f3ee] text-[#5f5e5a] hover:bg-[#e8e4de] border-none cursor-pointer">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <form th:action="@{/adopciones/solicitud/guardar}" th:object="${nuevaSolicitud}" method="post"
                  class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">

                <div class="col-span-1 md:col-span-2">
                    <label class="flex items-center gap-2 font-['DM_Sans'] text-[13px] text-[#5f5e5a] mb-2">
                        <i class="fa-solid fa-paw text-[#1d9e75]"></i> Mascota
                    </label>
                    <div class="relative">
                        <i class="fa-solid fa-paw absolute left-3 top-1/2 -translate-y-1/2 text-[#b4b2a9] text-[12px]"></i>
                        <select th:field="*{idMascota}"
                                class="w-full pl-8 pr-3 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75] bg-[#fafaf8] appearance-none" required>
                            <option value="">-- Selecciona una mascota --</option>
                            <option th:each="m : ${adoptionPets}" th:value="${m.id}"
                                    th:text="${m.nombre + ' (' + m.especie + ')'}">Luna (Perro)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="flex items-center gap-2 font-['DM_Sans'] text-[13px] text-[#5f5e5a] mb-2">
                        <i class="fa-solid fa-user text-[#1d9e75]"></i> Nombre del solicitante
                    </label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-[#b4b2a9] text-[12px]"></i>
                        <input type="text" th:field="*{applicantName}"
                               class="w-full pl-8 pr-3 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75] bg-[#fafaf8]"
                               placeholder="Nombre completo" required />
                    </div>
                </div>

                <div>
                    <label class="flex items-center gap-2 font-['DM_Sans'] text-[13px] text-[#5f5e5a] mb-2">
                        <i class="fa-solid fa-envelope text-[#1d9e75]"></i> Correo
                    </label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-[#b4b2a9] text-[12px]"></i>
                        <input type="email" th:field="*{email}"
                               class="w-full pl-8 pr-3 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75] bg-[#fafaf8]"
                               placeholder="correo@mail.com" required />
                    </div>
                </div>

                <div>
                    <label class="flex items-center gap-2 font-['DM_Sans'] text-[13px] text-[#5f5e5a] mb-2">
                        <i class="fa-solid fa-phone text-[#1d9e75]"></i> Teléfono
                    </label>
                    <div class="relative">
                        <i class="fa-solid fa-phone absolute left-3 top-1/2 -translate-y-1/2 text-[#b4b2a9] text-[12px]"></i>
                        <input type="tel" th:field="*{phone}"
                               class="w-full pl-8 pr-3 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75] bg-[#fafaf8]"
                               placeholder="987654321" required />
                    </div>
                </div>

                <div>
                    <label class="flex items-center gap-2 font-['DM_Sans'] text-[13px] text-[#5f5e5a] mb-2">
                        <i class="fa-solid fa-location-dot text-[#1d9e75]"></i> Distrito
                    </label>
                    <div class="relative">
                        <i class="fa-solid fa-location-dot absolute left-3 top-1/2 -translate-y-1/2 text-[#b4b2a9] text-[12px]"></i>
                        <input type="text" th:field="*{district}"
                               class="w-full pl-8 pr-3 py-2 border border-[#e8e4de] rounded-[12px] font-['DM_Sans'] text-[14px] focus:outline-none focus:border-[#1d9e75] bg-[#fafaf8]"
                               placeholder="Ej. Miraflores" required />
                    </div>
                </div>

                <div class="col-span-1 md:col-span-2 flex gap-3 justify-end pt-2">
                    <button type="button" onclick="cerrarModal('modalSolicitud')"
                            class="px-6 py-2 border border-[#e8e4de] rounded-[40px] font-['DM_Sans'] text-[14px] text-[#5f5e5a] hover:bg-[#f7f3ee] bg-white border-none cursor-pointer transition-colors">
                        Cancelar
                    </button>
                    <button type="submit"
                            class="flex items-center gap-2 px-6 py-2 bg-[#1d9e75] text-white rounded-[40px] font-['DM_Sans'] font-semibold text-[14px] hover:bg-[#158963] border-none cursor-pointer transition-colors">
                        <i class="fa-solid fa-floppy-disk"></i> Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
    var TAB_ACTIVE   = ['bg-white', 'text-[#085041]', 'shadow-sm'];
    var TAB_INACTIVE = ['text-[#5f5e5a]'];

    function switchAdoptionTab(tabKey) {
        document.querySelectorAll('.tab-panel-ad').forEach(function(p) { p.classList.add('hidden'); });
        document.querySelectorAll('.tab-btn-ad').forEach(function(b) {
            TAB_ACTIVE.forEach(function(c)   { b.classList.remove(c); });
            TAB_INACTIVE.forEach(function(c) { b.classList.add(c); });
        });
        var panel = document.getElementById('panel-' + tabKey);
        if (panel) panel.classList.remove('hidden');
        var activeBtn = document.getElementById('tab-' + tabKey);
        if (activeBtn) {
            TAB_INACTIVE.forEach(function(c) { activeBtn.classList.remove(c); });
            TAB_ACTIVE.forEach(function(c)   { activeBtn.classList.add(c); });
        }
        var label = document.getElementById('btn-agregar-label');
        var btn   = document.getElementById('btn-agregar');
        if (tabKey === 'pets') {
            label.textContent = 'Agregar Perfil';
            btn.onclick = function() { abrirModalMascotaNuevo(); };
        } else {
            label.textContent = 'Nueva Solicitud';
            btn.onclick = function() { abrirModal('modalSolicitud'); };
        }
    }

    function abrirModal(id) {
        document.getElementById(id).classList.remove('hidden');
    }

    function cerrarModal(id) {
        document.getElementById(id).classList.add('hidden');
    }

    function abrirModalMascotaNuevo() {
        document.getElementById('modalMascotaTitulo').innerHTML =
            '<i class="fa-solid fa-paw text-[#1d9e75] mr-2 text-[16px]"></i> Nuevo Perfil de Adopción';
        document.getElementById('m-id').value          = '';
        document.getElementById('m-nombre').value      = '';
        document.getElementById('m-raza').value        = '';
        document.getElementById('m-edad').value        = '';
        document.getElementById('m-descripcion').value = '';
        document.getElementById('m-fecha').value       = '';
        document.getElementById('m-especie').value     = 'Perro';
        document.getElementById('m-sexo').value        = 'Macho';
        document.getElementById('m-estado').value      = 'disponible';
        abrirModal('modalMascota');
    }

    function abrirModalMascotaEditar(btn) {
        var d = btn.dataset;
        document.getElementById('modalMascotaTitulo').innerHTML =
            '<i class="fa-solid fa-pen text-[#1d9e75] mr-2 text-[16px]"></i> Editar Perfil de Adopción';
        document.getElementById('m-id').value          = d.id;
        document.getElementById('m-nombre').value      = d.nombre;
        document.getElementById('m-raza').value        = d.raza;
        document.getElementById('m-edad').value        = d.edad;
        document.getElementById('m-descripcion').value = d.descripcion || '';
        document.getElementById('m-fecha').value       = d.fecha || '';
        document.getElementById('m-especie').value     = d.especie;
        document.getElementById('m-sexo').value        = d.sexo;
        document.getElementById('m-estado').value      = d.estado;
        abrirModal('modalMascota');
    }

    function marcarLeidoAsync(id, yaLeido) {
        if (yaLeido) return;
        fetch('/adopciones/api/marcar-leido/' + id, { method: 'POST' })
            .then(function(res) {
                if (res.ok) {
                    var card = document.getElementById('req-card-' + id);
                    if (card) {
                        card.classList.remove('border-[#f5c6a8]', 'bg-[#fffaf8]');
                        card.classList.add('border-[#e8e4de]');
                    }
                    var badge = document.getElementById('badge-unread-' + id);
                    if (badge) badge.remove();
                }
            });
    }

    function cambiarEstadoAsync(id, nuevoEstado) {
        fetch('/adopciones/api/cambiar-estado/' + id + '?status=' + nuevoEstado, { method: 'POST' })
            .then(function(res) {
                if (res.ok) {
                    var badge = document.getElementById('status-badge-' + id);
                    if (badge) {
                        badge.className = "inline-flex items-center gap-1 px-3 py-1 rounded-full text-[12px] font-semibold transition-all";
                        var extras = (stylesMap[nuevoEstado] || '').split(' ').filter(Boolean);
                        extras.forEach(function(cls) { badge.classList.add(cls); });
                        badge.textContent = labelsMap[nuevoEstado] || nuevoEstado;
                    }
                }
            });
    }

    document.addEventListener('DOMContentLoaded', function() {
        ['modalMascota','modalSolicitud'].forEach(function(id) {
            document.getElementById(id).addEventListener('click', function(e) {
                if (e.target === this) cerrarModal(id);
            });
        });
        var params     = new URLSearchParams(window.location.search);
        var action     = params.get('action');
        var tab        = params.get('tab');
        var initialTab = (action === 'nueva-solicitud' || tab === 'requests') ? 'requests' : 'pets';
        switchAdoptionTab(initialTab);
    });
</script>

<!-- 2. Solo las variables de Thymeleaf van con th:inline -->
<script th:inline="javascript">
    var stylesMap = /*[[${statusStylesMap}]]*/ {};
    var labelsMap = /*[[${statusLabelsMap}]]*/ {};
</script>
    

</main>
</body>
</html>
