<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'pacientes', 'Detalle del Paciente')}">
<head>
    <title>Detalle del Paciente - Argos</title>
</head>
<body>

<main class="space-y-6">

    <a th:href="@{/pacientes}" class="flex items-center gap-2 text-[#5f5e5a] hover:text-[#085041] font-['DM_Sans'] text-[14px] transition-colors inline-flex">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Volver a Pacientes
    </a>

    <div th:if="${patient == null}" class="bg-white rounded-[20px] p-12 text-center border border-[#e8e4de]">
        <p class="font-['DM_Sans'] text-[16px] text-[#5f5e5a]">Paciente no encontrado</p>
    </div>

    <div th:unless="${patient == null}" class="bg-white rounded-[20px] p-6 border border-[#e8e4de] shadow-sm">

        <div class="flex items-center gap-8 mb-6">
            <div>
                <p class="font-['DM_Sans'] text-[12px] text-[#5f5e5a]">Paciente</p>
                <p class="font-['Playfair_Display'] font-bold text-[24px] text-[#085041]" th:text="${patient.name}">Nombre Paciente</p>
            </div>
            <div class="w-px h-10 bg-[#e8e4de]" ></div>
            <div>
                <p class="font-['DM_Sans'] text-[12px] text-[#5f5e5a]">Dueño</p>
                <p class="font-['DM_Sans'] font-semibold text-[16px] text-[#2c2c2a]" th:text="${patient.cliente != null ? patient.cliente.nombre : 'Sin registrar'}">Nombre Dueño</p>
            </div>
        </div>

        <div class="border-b border-[#e8e4de] mb-6">
            <h2 class="pb-3 font-['DM_Sans'] text-[14px] text-[#085041] font-semibold border-b-2 border-[#1d9e75] inline-block">Información General</h2>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
            <div>
                <p class="font-['DM_Sans'] text-[12px] text-[#5f5e5a] mb-1">ID Sistema</p>
                <p class="font-['DM_Sans'] text-[15px] text-[#2c2c2a]" th:text="${patient.id}">—</p>
            </div>
            <div>
                <p class="font-['DM_Sans'] text-[12px] text-[#5f5e5a] mb-1">Especie</p>
                <p class="font-['DM_Sans'] text-[15px] text-[#2c2c2a]" th:text="${patient.species}">—</p>
            </div>
            <div>
                <p class="font-['DM_Sans'] text-[12px] text-[#5f5e5a] mb-1">Sexo</p>
                <p class="font-['DM_Sans'] text-[15px] text-[#2c2c2a]" th:text="${patient.sex}">—</p>
            </div>
            <div>
                <p class="font-['DM_Sans'] text-[12px] text-[#5f5e5a] mb-1">Estado Actual</p>
                <span class="inline-block px-3 py-1 mt-1 rounded-[20px] font-['DM_Sans'] text-[12px] font-medium" th:classappend="${patient.status == 'ACTIVO'} ? 'bg-[#e1f5ee] text-[#085041]' : 'bg-[#ececf0] text-[#5f5e5a]'" th:text="${patient.status}">Activo</span>
            </div>
        </div>
    </div>
</main>
</body>
</html>
